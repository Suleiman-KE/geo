<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Interactive Spinning 3D Globe (Three.js)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body { height:100%; margin:0; background:#000; }
    #container { width:100%; height:100vh; overflow:hidden; position:relative; }
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      font-family: Inter, system-ui, sans-serif;
      font-size: 13px;
      transform: translate(-50%, -120%);
      display: none;
      white-space: nowrap;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="tooltip"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.153.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.153.0/examples/jsm/controls/OrbitControls.js';

    const container = document.getElementById('container');
    const tooltip = document.getElementById('tooltip');

    // Scene, camera, renderer
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0x888888);
    scene.add(ambient);
    const dir = new THREE.DirectionalLight(0xffffff, 1);
    dir.position.set(5, 3, 5);
    scene.add(dir);

    // Earth
    const R = 1;
    const sphereGeo = new THREE.SphereGeometry(R, 64, 64);
    const loader = new THREE.TextureLoader();

    // Replace these URLs if you prefer other textures
    const earthMapURL = 'https://upload.wikimedia.org/wikipedia/commons/8/80/Equirectangular_projection_SW.jpg';
    // optional cloud texture (semi-transparent)
    const cloudMapURL = 'https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png';

    const earthMat = new THREE.MeshStandardMaterial({
      map: loader.load(earthMapURL),
      roughness: 1,
      metalness: 0
    });
    const earth = new THREE.Mesh(sphereGeo, earthMat);
    scene.add(earth);

    // Optional clouds layer (slightly bigger sphere, transparent)
    const cloudGeo = new THREE.SphereGeometry(R + 0.01, 64, 64);
    const cloudMat = new THREE.MeshStandardMaterial({
      map: loader.load(cloudMapURL),
      transparent: true,
      opacity: 0.8,
      depthWrite: false,
    });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    scene.add(clouds);

    // Starfield background
    const starsGeo = new THREE.SphereGeometry(90, 64, 64);
    const starsMat = new THREE.MeshBasicMaterial({
      map: loader.load('https://raw.githubusercontent.com/ajay2507/space-webgl/master/images/galaxy_starfield.png'),
      side: THREE.BackSide,
      transparent: true
    });
    const starMesh = new THREE.Mesh(starsGeo, starsMat);
    scene.add(starMesh);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enablePan = false;
    controls.minDistance = 1.2;
    controls.maxDistance = 5;

    // Auto-spin when NOT interacting
    let isInteracting = false;
    renderer.domElement.addEventListener('pointerdown', () => isInteracting = true);
    renderer.domElement.addEventListener('pointerup', () => isInteracting = false);
    renderer.domElement.addEventListener('pointerout', () => isInteracting = false);

    // Raycaster for marker hover/click
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    // Markers container
    const markers = new THREE.Group();
    scene.add(markers);

    // Convert lat/lon -> Vector3 on sphere surface
    function latLonToVector3(lat, lon, radius = R) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);
      const x = -radius * Math.sin(phi) * Math.cos(theta);
      const z = radius * Math.sin(phi) * Math.sin(theta);
      const y = radius * Math.cos(phi);
      return new THREE.Vector3(x, y, z);
    }

    // Add a basic spherical marker
    function addMarker(lat, lon, label = '', color = 0xff4444, size = 0.02) {
      const pos = latLonToVector3(lat, lon, R + 0.01);
      const g = new THREE.SphereGeometry(size, 8, 8);
      const m = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color }));
      m.position.copy(pos);

      // store metadata for tooltip
      m.userData = { label };
      markers.add(m);
      return m;
    }

    // Example markers
    addMarker(37.7749, -122.4194, 'San Francisco');
    addMarker(51.5074, -0.1278, 'London', 0x00ffcc);
    addMarker(-33.8688, 151.2093, 'Sydney', 0xffcc00);

    // Tooltip handling
    function showTooltip(x, y, html) {
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
      tooltip.innerHTML = html;
      tooltip.style.display = 'block';
    }
    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    function onPointerMove(e) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(markers.children, true);
      if (intersects.length > 0) {
        const obj = intersects[0].object;
        showTooltip(e.clientX, e.clientY, obj.userData.label || 'Marker');
        renderer.domElement.style.cursor = 'pointer';
      } else {
        hideTooltip();
        renderer.domElement.style.cursor = 'default';
      }
    }
    renderer.domElement.addEventListener('pointermove', onPointerMove);

    // Clicking markers
    renderer.domElement.addEventListener('click', (e) => {
      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(markers.children, true);
      if (intersects.length > 0) {
        const obj = intersects[0].object;
        alert('Clicked: ' + (obj.userData.label || 'Marker'));
      }
    });

    // Resize handling
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // Animation loop
    const spinSpeed = 0.002;
    function animate() {
      requestAnimationFrame(animate);
      if (!isInteracting) {
        // rotate the earth and clouds slowly
        earth.rotation.y += spinSpeed;
        clouds.rotation.y += spinSpeed * 1.1;
      }
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Accessibility: reduce motion if user prefers reduced-motion
    const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (mq.matches) {
      // stop auto spin
      // you can also reduce rendering frequency here
    }

  </script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'unsafe-inline'">
  <title>Interactive Spinning 3D Globe (Three.js)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body { height:100%; margin:0; background:#000; }
    #container { width:100%; height:100vh; overflow:hidden; position:relative; }
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      font-family: Inter, system-ui, sans-serif;
      font-size: 13px;
      transform: translate(-50%, -120%);
      display: none;
      white-space: nowrap;
      z-index: 10;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: system-ui;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="tooltip"></div>
  <div id="info">Drag to rotate • Scroll to zoom</div>

  <script async src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
  <script src="globe.js"></script>
</body>
</html>

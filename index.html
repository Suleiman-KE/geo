<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'unsafe-inline'">
  <title>Interactive 3D Globe - Airports</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body { height:100%; margin:0; background:#000; font-family: system-ui; }
    #container { width:100%; height:100vh; overflow:hidden; position:relative; }
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      transform: translate(-50%, -120%);
      display: none;
      white-space: nowrap;
      z-index: 10;
      border: 1px solid #4CAF50;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #4CAF50;
      font-size: 12px;
      opacity: 0.8;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 4px;
    }
    #airportPanel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.9);
      color: #fff;
      padding: 15px;
      border-radius: 8px;
      max-width: 300px;
      max-height: 300px;
      overflow-y: auto;
      border: 2px solid #4CAF50;
      display: none;
      z-index: 20;
    }
    #airportPanel h3 {
      margin: 0 0 10px 0;
      color: #4CAF50;
      font-size: 16px;
    }
    #airportPanel ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #airportPanel li {
      padding: 5px 0;
      border-bottom: 1px solid #333;
      font-size: 12px;
    }
    #airportPanel li:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="tooltip"></div>
  <div id="info">🌍 Drag to rotate • Scroll to zoom • Click on countries to see airports</div>
  <div id="airportPanel"></div>

  <script async src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
  <script src="globe.js"></script>
</body>
</html>
